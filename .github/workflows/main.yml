name: Issue Reader

on:
  issues:
    types:
      - opened
      - reopened

jobs:
  read-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v2
      
      - name: Echo issue information
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Issue Number: ${{ github.event.issue.number }}"
          echo "Issue Title: ${{ github.event.issue.title }}"
          echo "Issue Body: ${{ github.event.issue.body }}"
          echo "Issue Labels: ${{ join(github.event.issue.labels.*.name, ', ') }}"
          echo "Issue Assignees: ${{ join(github.event.issue.assignees.*.login, ', ') }}"
          
          # Example of using curl to retrieve issue details (optional)
          ISSUE_RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUMBER)
          echo "Issue Information: $ISSUE_RESPONSE"

