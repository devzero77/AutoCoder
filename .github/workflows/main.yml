name: Generate Code using ChatGPT and script.sh

on:
  issues:
    types: [opened, edited]

jobs:
  generate-code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set permissions for script.sh
        run: chmod +x ./AutoCoder/stage5/script.sh

      - name: Run script.sh
        run: ./scripts/script.sh ${{ secrets.GITHUB_TOKEN }} ${{ github.repository }} ${{ github.event.issue.number }} ${{ secrets.OPENAI_API_KEY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload generated files as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-code
          path: ./**/*

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: generated-code
          path: generated-code

      - name: List files in the artifact
        run: ls -R generated-code

      - name: Display content of generated files
        run: |
          for file in $(find generated-code -type f); do
            echo "Content of $file:"
            cat "$file"
            echo ""
          done
